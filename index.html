<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MonGam - Ultimate Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #38bdf8;
            --bg-deep: #020617;
        }

        /* --- HYPER-FLUID BACKGROUND --- */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000;
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(260,100%,10%,1) 0, transparent 50%),
                radial-gradient(at 50% 50%, hsla(210,100%,5%,1) 0, transparent 50%);
            filter: blur(60px);
            animation: meshMove 15s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(5%, 5%); }
        }

        /* --- LAYOUT CONTAINER --- */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px; /* Better PC support */
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        /* --- THE CARD: EVOLVED SIZE & ALIGNMENT --- */
        .card-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-wrapper {
            perspective: 2000px;
            width: 100%;
            max-width: 500px; /* Max size for PC */
            aspect-ratio: 1.58 / 1; /* Standard card ratio */
        }

        .card-inner {
            width: 100%;
            height: 100%;
            border-radius: clamp(24px, 5vw, 32px);
            position: relative;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            padding: clamp(24px, 6vw, 40px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.9);
        }

        /* Realistic Surface Grain */
        .card-grain {
            position: absolute;
            inset: 0;
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        .card-light {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.25) 0%, transparent 60%);
            pointer-events: none;
            z-index: 3;
        }

        .pattern-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.2;
            z-index: 2;
            pointer-events: none;
        }

        /* TIER STYLES */
        .tier-0 { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .tier-0 .pattern-overlay { background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 16px 16px; }

        .tier-1 { background: linear-gradient(135deg, #92400e 0%, #451a03 100%); }
        .tier-1 .pattern-overlay { background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40' fill='%23fff' fill-opacity='0.1'/%3E%3C/svg%3E"); }

        .tier-2 { background: linear-gradient(135deg, #64748b 0%, #1e293b 100%); }
        .tier-2 .pattern-overlay { background-image: url("data:image/svg+xml,%3Csvg width='100' height='20' viewBox='0 0 100 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M21.184 20c.357-.13.72-.264 1.088-.402l1.768-.661C33.64 15.347 39.647 14 50 14c10.271 0 15.362 1.222 24.629 4.928.955.383 1.869.74 2.75 1.072h6.125c-1.285-.515-2.618-1.04-4-1.543C68.96 14.173 62.477 13 50 13c-12.433 0-18.784 1.157-29.04 5.158-.934.363-1.834.717-2.705 1.054H21.184z' fill='%23fff' fill-opacity='0.1'/%3E%3C/svg%3E"); }

        .tier-3 { background: linear-gradient(135deg, #fbbf24 0%, #92400e 100%); border-color: rgba(251, 191, 36, 0.4); }
        .tier-3 .pattern-overlay { background-image: url("data:image/svg+xml,%3Csvg width='52' height='26' viewBox='0 0 52 26' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fff' fill-opacity='0.1'%3E%3Cpath d='M10 10c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6h2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4v2c-3.314 0-6-2.686-6-6 0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6zm25.464-1.95l2.536 1.464L35.464 11l-2.536-1.464 2.536-1.464z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }

        .tier-4 { background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%); color: #0f172a; border-color: rgba(255,255,255,0.8); }
        .tier-4 #display-balance, .tier-4 #display-card-no, .tier-4 p, .tier-4 i, .tier-4 #rank-display { color: #0f172a !important; }

        .tier-5 { background: #000; border: 1px solid #4f46e5; }
        .tier-5 .pattern-overlay { background-image: url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 0L6 3L3 6L0 3Z' fill='%234f46e5' fill-opacity='0.3'/%3E%3C/svg%3E"); }

        .tier-6 { background: linear-gradient(45deg, #000, #312e81, #701a75, #000); background-size: 300% 300%; animation: aura 8s infinite linear; border-color: rgba(255,255,255,0.3); }
        @keyframes aura { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .nav-btn {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px 0;
            border-radius: 32px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            gap: 4px;
            text-decoration: none;
        }

        .nav-btn i { font-size: 20px; transition: transform 0.3s; }
        .nav-btn span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

        .nav-btn.active { color: #fff; background: rgba(255, 255, 255, 0.05); }
        .nav-btn.active i { transform: translateY(-2px); color: var(--accent); }

        .nav-btn:active { transform: scale(0.92); }

        /* --- ANIMATIONS --- */
        .float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .chip-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: chipSweep 4s infinite;
        }
        @keyframes chipSweep { 0% { left: -100%; } 100% { left: 100%; } }

        @media (min-width: 768px) {
            .card-wrapper { max-width: 580px; }
            .nav-bar { width: 440px; bottom: 40px; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <div class="app-container">
        <!-- Dashboard Header -->
        <header class="p-6 md:p-10 flex justify-between items-center">
            <div>
                <p class="text-[10px] font-black text-sky-500 uppercase tracking-[0.4em] mb-1">MonGam OS</p>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-white">Dashboard</h1>
            </div>
            <div class="flex bg-white/5 p-1.5 rounded-2xl border border-white/10 backdrop-blur-md">
                <button onclick="setCurrency('INR')" id="btn-inr" class="px-5 py-2.5 rounded-xl text-[10px] font-black transition-all bg-white text-black shadow-lg">INR</button>
                <button onclick="setCurrency('USD')" id="btn-usd" class="px-5 py-2.5 rounded-xl text-[10px] font-black transition-all text-slate-400 hover:text-white">USD</button>
            </div>
        </header>

        <!-- Card Section (Centered) -->
        <main class="card-section">
            <div class="card-wrapper" id="card-sensor">
                <div id="main-card" class="card-inner tier-0 float">
                    <div class="card-grain"></div>
                    <div class="pattern-overlay"></div>
                    <div class="card-light"></div>
                    
                    <div class="flex justify-between items-start relative z-10">
                        <div class="space-y-6">
                            <!-- Premium Chip -->
                            <div class="w-16 h-11 bg-gradient-to-br from-yellow-100 via-yellow-400 to-yellow-600 rounded-xl relative overflow-hidden shadow-2xl border border-yellow-200/50">
                                <div class="chip-glow"></div>
                                <div class="absolute inset-0 opacity-40 bg-[radial-gradient(#000_1px,transparent_1px)] bg-[length:4px_4px]"></div>
                                <div class="absolute inset-0 flex flex-col justify-around py-1 px-3">
                                    <div class="h-[1px] w-full bg-black/20"></div>
                                    <div class="h-[1px] w-full bg-black/20"></div>
                                    <div class="h-[1px] w-full bg-black/20"></div>
                                </div>
                            </div>
                            <i class="fa-solid fa-wifi rotate-90 text-white/30 text-sm ml-2"></i>
                        </div>
                        <div class="text-right">
                            <div id="tier-tag" class="inline-block bg-black/30 backdrop-blur-xl px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-[0.2em] text-white border border-white/20">Standard</div>
                            <h2 id="rank-display" class="mt-3 text-[11px] font-bold text-sky-400 uppercase tracking-widest">Junior Associate</h2>
                        </div>
                    </div>

                    <div class="relative z-10">
                        <p id="display-card-no" class="text-xl md:text-3xl tracking-[0.3em] font-['JetBrains_Mono'] text-white/90 mb-8 drop-shadow-2xl">**** **** **** 0000</p>
                        
                        <div class="flex justify-between items-end">
                            <div class="space-y-1">
                                <p class="text-[9px] uppercase tracking-[0.3em] text-white/40 font-bold">Account Valuation</p>
                                <p id="display-balance" class="text-4xl md:text-5xl font-extrabold tracking-tighter text-white">₹ 0</p>
                            </div>
                            <div class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-md flex items-center justify-center rotate-12 shadow-inner">
                                <i class="fa-solid fa-bolt-lightning text-2xl text-yellow-400"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer Note -->
        <footer class="p-8 pb-32 flex flex-col items-center opacity-30 text-center">
            <i class="fa-solid fa-shield-halved text-4xl mb-4"></i>
            <p class="text-[9px] font-bold uppercase tracking-[0.5em]">256-Bit Encrypted Session</p>
        </footer>
    </div>

    <!-- Bottom Navigation -->
    <nav class="nav-bar">
        <a href="earn.html" class="nav-btn active">
            <i class="fa-solid fa-hand-holding-dollar"></i>
            <span>Earn</span>
        </a>
        <a href="invest.html" class="nav-btn">
            <i class="fa-solid fa-chart-line"></i>
            <span>Invest</span>
        </a>
        <a href="luxury.html" class="nav-btn">
            <i class="fa-solid fa-car-side"></i>
            <span>Luxury</span>
        </a>
        <a href="support.html" class="nav-btn">
            <i class="fa-solid fa-headset"></i>
            <span>Support</span>
        </a>
    </nav>

    <script>
        let state = {
            balance: 0, 
            currency: 'INR',
            cardNo: `**** **** **** ${Math.floor(1000 + Math.random() * 9000)}`
        };

        const TIERS = [
            { name: "Standard", inr: 0, class: 'tier-0', rank: "Junior Associate" },
            { name: "Copper", inr: 10000, class: 'tier-1', rank: "Director" },
            { name: "Chrome", inr: 100000, class: 'tier-2', rank: "Regional VP" },
            { name: "Gold", inr: 1000000, class: 'tier-3', rank: "Managing Director" },
            { name: "Platinum", inr: 10000000, class: 'tier-4', rank: "Global CEO" },
            { name: "Obsidian", inr: 100000000, class: 'tier-5', rank: "Chairman" },
            { name: "Cosmic", inr: 1000000000, class: 'tier-6', rank: "Sovereign" }
        ];

        function init() {
            const saved = localStorage.getItem('mongam_save_v5');
            if (saved) state = JSON.parse(saved);
            
            setupCardInteractions();
            updateUI();
        }

        function setupCardInteractions() {
            const card = document.getElementById('main-card');
            const sensor = document.getElementById('card-sensor');

            const handleMove = (e) => {
                const rect = sensor.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                
                const xPercent = (x / rect.width) * 100;
                const yPercent = (y / rect.height) * 100;
                
                card.style.setProperty('--x', `${xPercent}%`);
                card.style.setProperty('--y', `${yPercent}%`);

                const rotateX = (yPercent - 50) / 4;
                const rotateY = -(xPercent - 50) / 4;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
                card.style.boxShadow = `${-rotateY * 2}px ${rotateX * 2}px 60px -10px rgba(0,0,0,0.8)`;
            };

            const resetCard = () => {
                card.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
                card.style.boxShadow = `0 40px 80px -20px rgba(0,0,0,0.9)`;
            };

            sensor.addEventListener('mousemove', handleMove);
            sensor.addEventListener('mouseleave', resetCard);
            sensor.addEventListener('touchmove', handleMove);
            sensor.addEventListener('touchend', resetCard);
        }

        function setCurrency(curr) {
            state.currency = curr;
            updateUI();
            localStorage.setItem('mongam_save_v5', JSON.stringify(state));
        }

        function updateUI() {
            const balanceEl = document.getElementById('display-balance');
            const card = document.getElementById('main-card');
            const tierTag = document.getElementById('tier-tag');
            const rankEl = document.getElementById('rank-display');
            const cardNoEl = document.getElementById('display-card-no');

            let activeTier = TIERS[0];
            TIERS.forEach(t => { if(state.balance >= t.inr) activeTier = t; });

            TIERS.forEach(t => card.classList.remove(t.class));
            card.classList.add(activeTier.class);
            tierTag.innerText = activeTier.name;
            rankEl.innerText = activeTier.rank;
            cardNoEl.innerText = state.cardNo;

            const btnInr = document.getElementById('btn-inr');
            const btnUsd = document.getElementById('btn-usd');
            if (state.currency === 'INR') {
                balanceEl.innerText = `₹ ${state.balance.toLocaleString('en-IN')}`;
                btnInr.className = "px-5 py-2.5 rounded-xl text-[10px] font-black bg-white text-black shadow-lg";
                btnUsd.className = "px-5 py-2.5 rounded-xl text-[10px] font-black text-slate-400 hover:text-white";
            } else {
                balanceEl.innerText = `$ ${(state.balance * 0.012).toLocaleString('en-US', {maximumFractionDigits: 0})}`;
                btnUsd.className = "px-5 py-2.5 rounded-xl text-[10px] font-black bg-white text-black shadow-lg";
                btnInr.className = "px-5 py-2.5 rounded-xl text-[10px] font-black text-slate-400 hover:text-white";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
